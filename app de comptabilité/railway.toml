[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume must be created in Railway dashboard → Volumes → Mount at /app/data
# Then set env var DATA_DIR=/app/data in Railway → Variables
